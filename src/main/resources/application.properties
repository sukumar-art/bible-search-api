# Server - Railway injects PORT automatically, fallback to 8080 locally
server.port=${PORT:8080}

# Anthropic API - set ANTHROPIC_API_KEY in Railway Variables tab
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.base-url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-5
anthropic.max-tokens=4000
anthropic.version=2023-06-01

# CORS - add your Vercel URL here
cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://bible-appp.vercel.app

# UTF-8 encoding - critical for Telugu, Hindi, Tamil etc.
spring.jackson.default-property-inclusion=non_null
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Logging
logging.level.com.seekfindscripture=DEBUG
